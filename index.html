      No CSP meta here on purpose. In dev, Vite needs inline scripts + a
      websocket for HMR, so a strict CSP would break `npm run dev`. For the
      production build, vite.config.ts injects a strict CSP (see
      electronRendererFix) that also allows the data: image URLs used for
      image-clipboard thumbnails.
    -->
  </head>

    <script type="module" src="/src/main.tsx"></script>
